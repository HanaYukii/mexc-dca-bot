# MEXC DCA Bot Configuration
# API keys are in .env (not here!)

# Schedule: Tuesday & Friday at 9:00 AM (UTC+8)
# Total per buy: 225 USDT (BTC 60% / ETH 25% / BNB 15%)

coins:
  - symbol: BTC/USDT
    amount_usdt: 135
    schedule: "0 9 * * 2,5"        # Tue & Fri at 9:00 AM
    limit_offset_pct: 0.5          # 0.5% below market

  - symbol: ETH/USDT
    amount_usdt: 56.25
    schedule: "0 9 * * 2,5"
    limit_offset_pct: 0.5

  - symbol: BNB/USDT
    amount_usdt: 33.75
    schedule: "0 9 * * 2,5"
    limit_offset_pct: 0.5

telegram:
  chat_id: ""                      # Your Telegram chat ID
  weekly_summary_day: 6            # Sunday

log_file: trades.jsonl

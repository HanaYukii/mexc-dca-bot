# MEXC DCA Bot Configuration
# API keys are in .env (not here!)

# Schedule: Daily at 9:00 AM (local time)
# Total per day: 50 USDT (BTC 35 / BNB 15)

coins:
  - symbol: BTC/USDT
    amount_usdt: 35
    schedule: "0 8 * * *"           # Daily at 8:00 AM
    limit_offset_pct: 0.5          # 0.5% below market

  - symbol: BNB/USDT
    amount_usdt: 15
    schedule: "0 8 * * *"
    limit_offset_pct: 0.5

# Paired-flip grid (separate process: python -m mexc_dca --grid)
# Each filled buy gets its own +profit% sell; lots run concurrently, spaced
# spacing% apart, capped at max_lots. Both legs maker (no fee on MEXC).
grid:
  symbol: ETH/USDT
  order_usdt: 25
  buy_offset_pct: 0.3              # first entry buy this % below market
  profit_pct: 1.0                  # each lot sells this % above its buy
  spacing_pct: 1.0                 # min gap between consecutive buy lots
  max_lots: 6                      # max concurrent lots (caps deployed capital ~300U)
  poll_interval_sec: 30
  log_file: grid_trades.jsonl
  state_file: grid_state.json

# 24h range-fade (separate daily task: python -m mexc_dca --rangefade)
# Another "DCA" that fires once a day and places, fire-and-forget:
#   a maker BUY at the 24h low  +  a maker SELL at the 24h high.
# Orders are NOT cancelled; they rest until filled. Balance guards skip a side
# when funds are tied up in resting orders.
rangefade:
  symbol: BTC/USDT
  order_usdt: 25
  log_file: rangefade_trades.jsonl

telegram:
  chat_id: ""                      # Your Telegram chat ID
  weekly_summary_day: 6            # Sunday

log_file: trades.jsonl

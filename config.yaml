# MEXC DCA Bot Configuration
# API keys are in .env (not here!)

# Schedule: Daily at 9:00 AM (UTC+8)
# Total per buy: 60 USDT (BTC 75% / BNB 25%) = 420 USDT/week

coins:
  - symbol: BTC/USDT
    amount_usdt: 45
    schedule: "0 9 * * *"          # Daily at 9:00 AM
    limit_offset_pct: 0.5          # 0.5% below market

  - symbol: BNB/USDT
    amount_usdt: 15
    schedule: "0 9 * * *"
    limit_offset_pct: 0.5

telegram:
  chat_id: ""                      # Your Telegram chat ID
  weekly_summary_day: 6            # Sunday

log_file: trades.jsonl

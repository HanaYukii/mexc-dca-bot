# MEXC DCA Bot Configuration
# API keys are in .env (not here!)

# Schedule: Daily at 9:00 AM (local time)
# Total per day: 50 USDT (BTC 35 / BNB 15)

coins:
  - symbol: BTC/USDT
    amount_usdt: 35
    schedule: "0 8 * * *"           # Daily at 8:00 AM
    limit_offset_pct: 0.5          # 0.5% below market

  - symbol: BNB/USDT
    amount_usdt: 15
    schedule: "0 8 * * *"
    limit_offset_pct: 0.5

# Single-slot flip grid (separate process: python -m mexc_dca --grid)
# Buy 50U at -buy_offset%, flip at +profit% — both maker (no fee on MEXC).
grid:
  symbol: ETH/USDT
  order_usdt: 50
  buy_offset_pct: 0.3              # place buy this % below market
  profit_pct: 1.0                  # sell this % above buy fill
  poll_interval_sec: 30
  log_file: grid_trades.jsonl
  state_file: grid_state.json

telegram:
  chat_id: ""                      # Your Telegram chat ID
  weekly_summary_day: 6            # Sunday

log_file: trades.jsonl
